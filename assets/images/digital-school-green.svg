<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">โรงเรียน ครู และนักเรียนในยุคดิจิทัล</title>
  <desc id="desc">ภาพโรงเรียนสมัยใหม่ ครูและนักเรียนใช้อุปกรณ์ดิจิทัล ท่ามกลางเครือข่ายเทคโนโลยีสีเขียว</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#effdf6"/>
      <stop offset="1" stop-color="#d7f6e6"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9e6c3"/>
      <stop offset="1" stop-color="#5ebd84"/>
    </linearGradient>
    <linearGradient id="school" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f7ef"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9fff2"/>
      <stop offset="1" stop-color="#6dd6ac"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0d5a3a" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#sky)"/>

  <!-- Digital network -->
  <g opacity=".45" stroke="#2bb673" stroke-width="4" fill="none">
    <path d="M90 125 C240 30 330 180 475 96 S770 35 915 120 S1090 165 1150 86"/>
    <path d="M100 260 C250 170 390 320 540 220 S830 150 1095 260"/>
    <path d="M260 75 L260 215 M930 70 L930 230 M690 50 L690 180"/>
  </g>
  <g fill="#28a86c">
    <circle cx="90" cy="125" r="12"/><circle cx="260" cy="75" r="12"/>
    <circle cx="475" cy="96" r="12"/><circle cx="690" cy="50" r="12"/>
    <circle cx="915" cy="120" r="12"/><circle cx="1150" cy="86" r="12"/>
    <circle cx="100" cy="260" r="10"/><circle cx="540" cy="220" r="10"/><circle cx="1095" cy="260" r="10"/>
  </g>

  <!-- Clouds -->
  <g fill="#ffffff" opacity=".82">
    <ellipse cx="180" cy="90" rx="78" ry="28"/>
    <ellipse cx="130" cy="95" rx="45" ry="23"/>
    <ellipse cx="230" cy="95" rx="48" ry="22"/>
    <ellipse cx="1000" cy="95" rx="78" ry="28"/>
    <ellipse cx="950" cy="98" rx="46" ry="22"/>
    <ellipse cx="1050" cy="100" rx="48" ry="22"/>
  </g>

  <!-- Ground -->
  <path d="M0 500 C170 450 315 515 470 485 S805 445 1200 510 L1200 720 L0 720 Z" fill="url(#ground)"/>
  <path d="M0 595 C200 540 380 625 570 590 S920 540 1200 600 L1200 720 L0 720 Z" fill="#3f9f69" opacity=".45"/>

  <!-- School building -->
  <g filter="url(#shadow)">
    <rect x="350" y="210" width="500" height="310" rx="20" fill="url(#school)" stroke="#41a875" stroke-width="6"/>
    <polygon points="315,235 600,115 885,235" fill="#168556"/>
    <rect x="565" y="390" width="70" height="130" rx="8" fill="#176847"/>
    <rect x="390" y="285" width="90" height="70" rx="10" fill="url(#screen)" stroke="#2ea66e" stroke-width="5"/>
    <rect x="510" y="285" width="90" height="70" rx="10" fill="url(#screen)" stroke="#2ea66e" stroke-width="5"/>
    <rect x="630" y="285" width="90" height="70" rx="10" fill="url(#screen)" stroke="#2ea66e" stroke-width="5"/>
    <rect x="750" y="285" width="60" height="70" rx="10" fill="url(#screen)" stroke="#2ea66e" stroke-width="5"/>
    <rect x="485" y="160" width="230" height="62" rx="16" fill="#ffffff" stroke="#2ea66e" stroke-width="5"/>
    <text x="600" y="201" text-anchor="middle" font-size="32" font-family="Tahoma, sans-serif" fill="#145c3d" font-weight="700">DIGITAL SCHOOL</text>
  </g>

  <!-- Wi-Fi -->
  <g transform="translate(600 110)" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round">
    <path d="M-58 0 Q0-50 58 0"/>
    <path d="M-36 20 Q0-10 36 20"/>
    <circle cx="0" cy="42" r="7" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Teacher -->
  <g transform="translate(205 400)" filter="url(#shadow)">
    <circle cx="70" cy="40" r="36" fill="#f4c7a1"/>
    <path d="M35 42 Q70 5 105 42 L100 12 Q70-8 40 14 Z" fill="#273e35"/>
    <rect x="35" y="78" width="72" height="105" rx="26" fill="#168556"/>
    <rect x="12" y="112" width="28" height="90" rx="14" fill="#f4c7a1" transform="rotate(12 26 157)"/>
    <rect x="103" y="112" width="28" height="90" rx="14" fill="#f4c7a1" transform="rotate(-18 117 157)"/>
    <rect x="24" y="178" width="33" height="112" rx="15" fill="#204b3a"/>
    <rect x="82" y="178" width="33" height="112" rx="15" fill="#204b3a"/>
    <rect x="0" y="92" width="130" height="88" rx="14" fill="#113d2d" stroke="#63d6a2" stroke-width="6"/>
    <rect x="14" y="106" width="102" height="58" rx="8" fill="url(#screen)"/>
    <circle cx="65" cy="135" r="10" fill="#118052"/>
  </g>

  <!-- Student 1 -->
  <g transform="translate(820 430)" filter="url(#shadow)">
    <circle cx="55" cy="28" r="30" fill="#f0bd95"/>
    <path d="M28 28 Q55-2 83 28 L80 4 Q55-12 32 5 Z" fill="#243a33"/>
    <rect x="25" y="58" width="62" height="90" rx="22" fill="#31b779"/>
    <rect x="14" y="142" width="29" height="94" rx="14" fill="#1e4c3a"/>
    <rect x="69" y="142" width="29" height="94" rx="14" fill="#1e4c3a"/>
    <rect x="-5" y="83" width="118" height="72" rx="12" fill="#173d31" stroke="#66d8a4" stroke-width="5"/>
    <rect x="8" y="95" width="92" height="46" rx="7" fill="url(#screen)"/>
  </g>

  <!-- Student 2 -->
  <g transform="translate(965 455)" filter="url(#shadow)">
    <circle cx="50" cy="28" r="28" fill="#f3c39b"/>
    <path d="M22 28 Q50-2 78 28 L74 4 Q48-10 25 6 Z" fill="#332f2b"/>
    <rect x="22" y="58" width="58" height="82" rx="20" fill="#1c9861"/>
    <rect x="10" y="136" width="27" height="90" rx="13" fill="#244d3b"/>
    <rect x="66" y="136" width="27" height="90" rx="13" fill="#244d3b"/>
    <rect x="-4" y="78" width="108" height="68" rx="12" fill="#173d31" stroke="#66d8a4" stroke-width="5"/>
    <rect x="8" y="90" width="84" height="44" rx="7" fill="url(#screen)"/>
  </g>

  <!-- Floating digital icons -->
  <g filter="url(#shadow)">
    <rect x="95" y="310" width="82" height="82" rx="22" fill="#ffffff" stroke="#3ab578" stroke-width="5"/>
    <path d="M122 350 h28 M136 336 v28" stroke="#1b8e5b" stroke-width="8" stroke-linecap="round"/>
    <rect x="920" y="220" width="88" height="88" rx="24" fill="#ffffff" stroke="#3ab578" stroke-width="5"/>
    <path d="M942 262 q22-24 44 0 M950 275 q14-15 28 0" fill="none" stroke="#1b8e5b" stroke-width="7" stroke-linecap="round"/>
    <circle cx="964" cy="286" r="5" fill="#1b8e5b"/>
    <rect x="1040" y="330" width="82" height="82" rx="22" fill="#ffffff" stroke="#3ab578" stroke-width="5"/>
    <path d="M1060 355 h42 v34 h-42 z M1070 348 h22" fill="none" stroke="#1b8e5b" stroke-width="6" stroke-linejoin="round"/>
  </g>
</svg>