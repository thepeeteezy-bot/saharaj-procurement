<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบใบสั่งซื้อ-สั่งจ้าง งานพัสดุ โรงเรียนสหราษฎร์รังสฤษดิ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* กำหนดฟอนต์หลักเป็น TH Sarabun New */
            font-family: 'TH Sarabun New', 'Sarabun', sans-serif;
            background-color: #f4f6f9;
            font-size: 1.1rem;
        }
        .header-banner {
            background-color: #1a5276;
            color: white;
            padding: 30px 0;
            text-align: center;
            border-bottom: 5px solid #f1c40f;
        }
        .nav-tabs .nav-link {
            color: #495057;
            font-size: 1.2rem;
        }
        .nav-tabs .nav-link.active {
            font-weight: 600;
            color: #1a5276;
            border-bottom: 3px solid #1a5276;
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="header-banner">
    <h2 class="fw-bold">ระบบใบสั่งซื้อ-สั่งจ้าง งานพัสดุ</h2>
    <h4>โรงเรียนสหราษฎร์รังสฤษดิ์</h4>
</div>

<div class="container mt-4 mb-5">
    <ul class="nav nav-tabs" id="systemTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="purchase-tab" data-bs-toggle="tab" data-bs-target="#purchase" type="button" role="tab">1. หน้าเว็บ: ใบสั่งซื้อ</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="hire-tab" data-bs-toggle="tab" data-bs-target="#hire" type="button" role="tab">2. หน้าเว็บ: ใบสั่งจ้าง</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="github-tab" data-bs-toggle="tab" data-bs-target="#github" type="button" role="tab">หน้า GitHub (ตารางข้อมูล)</button>
        </li>
    </ul>

    <div class="tab-content mt-4" id="systemTabContent">
        
        <div class="tab-pane fade show active" id="purchase" role="tabpanel">
            <div class="card shadow-sm p-4 border-primary">
                <h4 class="text-primary mb-4 fw-bold">สร้างใบสั่งซื้อพัสดุ</h4>
                <form onsubmit="saveRecord(event, 'ใบสั่งซื้อ')">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่</label>
                            <input type="text" class="form-control" id="p_id" placeholder="เช่น ซ.001/2569" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">วันที่</label>
                            <input type="date" class="form-control" id="p_date" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">เรื่อง</label>
                        <input type="text" class="form-control" id="p_subject" placeholder="ระบุรายการสั่งซื้อ" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">สถานประกอบการ</label>
                            <input type="text" class="form-control" id="p_vendor" placeholder="ชื่อร้านค้า / บริษัท" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เลขผู้เสียภาษี</label>
                            <input type="text" class="form-control" id="p_tax" placeholder="เลขประจำตัวผู้เสียภาษี 13 หลัก" required>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่โครงการ</label>
                            <input type="text" class="form-control" id="p_project" placeholder="อ้างอิงโครงการ" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จำนวนเงิน (บาท)</label>
                            <input type="number" step="0.01" class="form-control" id="p_amount" placeholder="0.00" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fs-5">บันทึกข้อมูลใบสั่งซื้อ</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="hire" role="tabpanel">
            <div class="card shadow-sm p-4 border-success">
                <h4 class="text-success mb-4 fw-bold">สร้างใบสั่งจ้าง</h4>
                <form onsubmit="saveRecord(event, 'ใบสั่งจ้าง')">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่</label>
                            <input type="text" class="form-control" id="h_id" placeholder="เช่น จ.001/2569" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">วันที่</label>
                            <input type="date" class="form-control" id="h_date" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">เรื่อง</label>
                        <input type="text" class="form-control" id="h_subject" placeholder="ระบุรายการสั่งจ้าง" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">สถานประกอบการ</label>
                            <input type="text" class="form-control" id="h_vendor" placeholder="ชื่อผู้รับจ้าง / บริษัท" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">เลขผู้เสียภาษี</label>
                            <input type="text" class="form-control" id="h_tax" placeholder="เลขประจำตัวผู้เสียภาษี 13 หลัก" required>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">เลขที่โครงการ</label>
                            <input type="text" class="form-control" id="h_project" placeholder="อ้างอิงโครงการ" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จำนวนเงิน (บาท)</label>
                            <input type="number" step="0.01" class="form-control" id="h_amount" placeholder="0.00" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fs-5">บันทึกข้อมูลใบสั่งจ้าง</button>
                </form>
            </div>
        </div>

        <div class="tab-pane fade" id="github" role="tabpanel">
            <div class="card shadow-sm p-4 border-secondary">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">ตารางข้อมูลพัสดุ (Repository Database)</h4>
                    <button class="btn btn-outline-danger btn-sm" onclick="clearData()">ล้างข้อมูล</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered align-middle">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>ประเภท</th>
                                <th>เลขที่</th>
                                <th>วันที่</th>
                                <th>เรื่อง</th>
                                <th>จำนวนเงิน</th>
                                <th>สถานประกอบการ</th>
                                <th>เลขผู้เสียภาษี</th>
                                <th>เลขที่โครงการ</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", loadRecords);

    function saveRecord(event, type) {
        event.preventDefault();
        
        // ตรวจสอบว่ากำลังดึงข้อมูลจากฟอร์มไหน
        let prefix = type === 'ใบสั่งซื้อ' ? 'p_' : 'h_';
        
        const record = {
            type: type,
            id: document.getElementById(prefix + 'id').value,
            date: document.getElementById(prefix + 'date').value,
            subject: document.getElementById(prefix + 'subject').value,
            vendor: document.getElementById(prefix + 'vendor').value,
            tax: document.getElementById(prefix + 'tax').value,
            project: document.getElementById(prefix + 'project').value,
            // แปลงรูปแบบตัวเลขให้มีคอมม่า
            amount: parseFloat(document.getElementById(prefix + 'amount').value).toLocaleString('th-TH', {minimumFractionDigits: 2})
        };

        // โหลดข้อมูลเก่าจากระบบ หากไม่มีให้สร้าง Array ว่าง
        let records = JSON.parse(localStorage.getItem('saharatProcurementDB')) || [];
        records.push(record); // เพิ่มรายการใหม่
        localStorage.setItem('saharatProcurementDB', JSON.stringify(records));

        alert('ระบบบันทึกข้อมูล "' + type + '" เลขที่ ' + record.id + ' เรียบร้อยแล้ว');
        event.target.reset(); // ล้างข้อมูลในฟอร์มหลังบันทึก
        loadRecords(); // อัปเดตตารางใหม่ทันที
    }

    function loadRecords() {
        let records = JSON.parse(localStorage.getItem('saharatProcurementDB')) || [];
        let tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';

        if (records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-3">ยังไม่มีข้อมูลในระบบ</td></tr>';
            return;
        }

        // เรียงและแสดงข้อมูล
        records.forEach(function(rec) {
            let badgeClass = rec.type === 'ใบสั่งซื้อ' ? 'bg-primary' : 'bg-success';
            let row = `<tr>
                <td class="text-center"><span class="badge ${badgeClass}">${rec.type}</span></td>
                <td class="text-center">${rec.id}</td>
                <td class="text-center">${rec.date}</td>
                <td>${rec.subject}</td>
                <td class="text-end text-danger fw-bold">${rec.amount} ฿</td>
                <td>${rec.vendor}</td>
                <td class="text-center">${rec.tax}</td>
                <td class="text-center">${rec.project}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function clearData() {
        if(confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลใบสั่งซื้อ/สั่งจ้างทั้งหมด?')) {
            localStorage.removeItem('saharatProcurementDB');
            loadRecords();
        }
    }
</script>
</body>
</html>
